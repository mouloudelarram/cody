<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Llama 2 · Local AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f55a;
      --accent-dim: #9ab83e;
      --text: #e8e4dc;
      --muted: #6b6762;
      --error: #ff6b6b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,245,90,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,245,90,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 760px;
    }

    header {
      margin-bottom: 52px;
      padding-top: 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(200,245,90,0.1);
      border: 1px solid rgba(200,245,90,0.25);
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(36px, 6vw, 58px);
      font-weight: 400;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 12px;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .chat-window {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 24px;
      min-height: 200px;
    }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .chat-header span { color: var(--accent); font-weight: 500; }

    #messages {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-height: 480px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #messages:empty::after {
      content: "Ask me anything — I'm running locally on your machine.";
      color: var(--muted);
      font-size: 14px;
      font-style: italic;
      display: block;
      text-align: center;
      padding: 40px 0;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .msg.user .msg-label { color: var(--accent-dim); }

    .msg-body {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-body {
      background: rgba(200,245,90,0.07);
      border-color: rgba(200,245,90,0.2);
    }

    .msg.error .msg-body {
      border-color: rgba(255,107,107,0.3);
      color: var(--error);
    }

    /* Thinking animation */
    .thinking .msg-body {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-style: italic;
    }

    .dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
      font-style: normal;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* Input area */
    .input-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 14px 18px;
      resize: none;
      min-height: 56px;
      max-height: 200px;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(200,245,90,0.4);
    }

    textarea::placeholder { color: var(--muted); }

    button#send-btn {
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 14px 22px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      height: 56px;
    }

    button#send-btn:hover { background: #d6ff6a; }
    button#send-btn:active { transform: scale(0.97); }
    button#send-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      letter-spacing: 0.03em;
    }

    footer {
      margin-top: 48px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.05em;
    }

    footer a { color: var(--accent-dim); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="badge">Running Locally</div>
      <h1>Ask <em>Llama 2</em></h1>
      <p class="subtitle">Powered by Ollama · No data leaves your machine</p>
    </header>

    <div class="chat-window">
      <div class="chat-header">
        <span>llama2</span> · response stream
      </div>
      <div id="messages"></div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea
          id="prompt"
          rows="1"
          placeholder="Type your question here..."
          autofocus
        ></textarea>
        <button id="send-btn">Send →</button>
      </div>
      <p class="hint">Press <kbd>Ctrl+Enter</kbd> to send</p>
    </div>

    <footer>
      Hosted on your machine · <a href="https://ollama.com" target="_blank">Ollama</a> + Llama 2
    </footer>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const promptEl   = document.getElementById('prompt');
    const sendBtn    = document.getElementById('send-btn');

    // Auto-resize textarea
    promptEl.addEventListener('input', () => {
      promptEl.style.height = 'auto';
      promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + 'px';
    });

    // Ctrl+Enter to send
    promptEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.ctrlKey) sendMessage();
    });

    sendBtn.addEventListener('click', sendMessage);

    function appendMessage(role, text, extra = '') {
      const wrap = document.createElement('div');
      wrap.className = `msg ${role} ${extra}`;
      wrap.innerHTML = `
        <div class="msg-label">${role === 'user' ? 'You' : role === 'error' ? 'Error' : 'Llama 2'}</div>
        <div class="msg-body">${text}</div>
      `;
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrap;
    }

    async function sendMessage() {
      const prompt = promptEl.value.trim();
      if (!prompt) return;

      appendMessage('user', escapeHtml(prompt));
      promptEl.value = '';
      promptEl.style.height = 'auto';
      sendBtn.disabled = true;

      // Thinking placeholder
      const thinkingEl = appendMessage('assistant', '<span>Thinking</span><span class="dots"><span>.</span><span>.</span><span>.</span></span>', 'thinking');

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();

        thinkingEl.remove();

        if (data.error) {
          appendMessage('error', escapeHtml(data.error));
        } else {
          appendMessage('assistant', escapeHtml(data.answer));
        }
      } catch (err) {
        thinkingEl.remove();
        appendMessage('error', 'Network error: could not reach the server.');
      } finally {
        sendBtn.disabled = false;
        promptEl.focus();
      }
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
