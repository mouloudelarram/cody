<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Cody AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>

    /* ── TOKENS ───────────────────────────────────────────────────────────── */
    :root {
      --bg-1:         #080b14;
      --bg-2:         #0c1020;
      --bg-3:         #101528;

      /* Glass surfaces */
      --glass-1:      rgba(255,255,255,0.04);
      --glass-2:      rgba(255,255,255,0.07);
      --glass-3:      rgba(255,255,255,0.10);
      --glass-border: rgba(255,255,255,0.10);
      --glass-border-bright: rgba(255,255,255,0.18);

      /* Accent — electric indigo-violet */
      --accent:       #7b8cff;
      --accent-2:     #a78bfa;
      --accent-glow:  rgba(123,140,255,0.25);
      --accent-glow-sm: rgba(123,140,255,0.12);

      /* Text */
      --text:         #eef0f8;
      --text-2:       #9ca3c4;
      --muted:        #5a6182;

      --error:        #f87171;

      --blur-sm:  blur(8px);
      --blur-md:  blur(16px);
      --blur-lg:  blur(28px);

      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── BODY & BACKGROUND ────────────────────────────────────────────────── */
    body {
      background: var(--bg-1);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      overflow-x: hidden;
    }

    /* Deep background gradient mesh */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%,  rgba(99,102,241,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 80%,  rgba(167,139,250,0.14) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(59,130,246,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle grid */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(123,140,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123,140,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── SIDEBAR ──────────────────────────────────────────────────────────── */
    #sidebar {
      position: relative;
      z-index: 20;
      width: 268px;
      min-width: 268px;
      background: var(--glass-1);
      backdrop-filter: var(--blur-lg);
      -webkit-backdrop-filter: var(--blur-lg);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: width .3s cubic-bezier(.4,0,.2,1),
                  min-width .3s cubic-bezier(.4,0,.2,1),
                  opacity .3s ease;
      overflow: hidden;
    }

    #sidebar.collapsed {
      width: 0;
      min-width: 0;
      opacity: 0;
      pointer-events: none;
    }

    .sidebar-head {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sidebar-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--glass-2);
      border: 1px solid var(--glass-border-bright);
      backdrop-filter: var(--blur-sm);
      color: var(--accent);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 999px;
    }
    .sidebar-badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.3; transform:scale(.6); }
    }

    #new-chat-btn {
      background: var(--glass-2);
      backdrop-filter: var(--blur-sm);
      color: var(--accent);
      border: 1px solid var(--glass-border-bright);
      border-radius: 8px;
      width: 30px; height: 30px;
      font-size: 18px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .2s, box-shadow .2s, transform .12s;
    }
    #new-chat-btn:hover {
      background: var(--glass-3);
      box-shadow: 0 0 12px var(--accent-glow-sm);
    }
    #new-chat-btn:active { transform: scale(.92); }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      scrollbar-width: thin;
      scrollbar-color: var(--glass-border) transparent;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 11px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .18s, border-color .18s;
    }
    .chat-item:hover {
      background: var(--glass-2);
      border-color: var(--glass-border);
    }
    .chat-item.active {
      background: var(--glass-2);
      border-color: rgba(123,140,255,0.3);
      box-shadow: inset 0 0 20px rgba(123,140,255,0.05);
    }
    .chat-item-body { flex:1; overflow:hidden; }
    .chat-item-title {
      font-size: 12.5px;
      font-weight: 400;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }
    .chat-item.active .chat-item-title { color: var(--accent); }
    .chat-item-date { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .del-btn {
      display: none;
      background: none;
      border: 1px solid transparent;
      border-radius: 5px;
      width: 22px; height: 22px;
      align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
      flex-shrink: 0;
    }
    .del-btn svg { width: 11px; height: 11px; }
    .chat-item:hover .del-btn { display: flex; }
    .del-btn:hover { color: var(--error); border-color: rgba(248,113,113,.3); }

    .sidebar-empty {
      padding: 44px 18px;
      text-align: center;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.9;
    }

    /* ── MAIN ─────────────────────────────────────────────────────────────── */
    #main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 40px 20px 80px;
      min-height: 100vh;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 80%;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* ── HEADER ───────────────────────────────────────────────────────────── */
    header {
      margin-bottom: 44px;
      padding-top: 20px;
    }

    #toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--glass-1);
      backdrop-filter: var(--blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      padding: 5px 15px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: 22px;
      transition: border-color .2s, color .2s, background .2s, box-shadow .2s;
    }
    #toggle-btn:hover {
      border-color: rgba(123,140,255,0.4);
      color: var(--accent);
      background: var(--glass-2);
      box-shadow: 0 0 16px var(--accent-glow-sm);
    }
    #toggle-btn::before { content: '☰'; font-style: normal; font-size: 12px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--glass-2);
      backdrop-filter: var(--blur-sm);
      border: 1px solid var(--glass-border-bright);
      color: var(--accent);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
    .badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }

    h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(36px, 6vw, 58px);
      font-weight: 300;
      line-height: 1.08;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    h1 em {
      font-style: normal;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* ── MODEL ROW ────────────────────────────────────────────────────────── */
    .model-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .model-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--glass-2);
      backdrop-filter: var(--blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      padding: 6px 16px 6px 12px;
      transition: border-color .2s, box-shadow .2s;
    }
    .model-pill:focus-within {
      border-color: rgba(123,140,255,0.4);
      box-shadow: 0 0 16px var(--accent-glow-sm);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }
    #model-select {
      background: none; border: none; outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 400;
      color: var(--text-2);
      cursor: pointer; max-width: 200px;
    }
    #model-select option { background: #13172a; color: var(--text); }

    /* ── CHAT WINDOW ──────────────────────────────────────────────────────── */
    .chat-window {
      background: var(--glass-1);
      backdrop-filter: var(--blur-lg);
      -webkit-backdrop-filter: var(--blur-lg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 20px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      flex: 1;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.06);
      transition: box-shadow .3s ease;
    }
    .chat-window:focus-within {
      box-shadow:
        0 8px 40px rgba(0,0,0,0.5),
        0 0 0 1px rgba(123,140,255,0.15),
        inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .chat-header {
      padding: 13px 20px;
      border-bottom: 1px solid var(--glass-border);
      background: var(--glass-2);
      backdrop-filter: var(--blur-sm);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .chat-header-left { display: flex; align-items: center; gap: 8px; }
    .chat-header span.model-name {
      color: var(--accent);
      font-weight: 500;
      text-shadow: 0 0 10px var(--accent-glow-sm);
    }
    .chat-header-title {
      font-size: 11px; color: var(--text-2);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 260px;
      text-transform: none; letter-spacing: 0;
    }

    /* ── MESSAGES ─────────────────────────────────────────────────────────── */
    #messages {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-height: none;
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--glass-border) transparent;
    }

    .suggestions-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      padding: 40px 0 24px;
    }
    .suggestions-label {
      font-size: 14px; color: var(--muted); font-weight: 300;
    }
    .suggestions {
      display: flex; flex-wrap: wrap;
      gap: 8px; justify-content: center;
    }
    .chip {
      background: var(--glass-2);
      backdrop-filter: var(--blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      padding: 7px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 400;
      color: var(--text-2);
      cursor: pointer;
      transition: all .2s ease;
    }
    .chip:hover {
      border-color: rgba(123,140,255,0.45);
      color: var(--accent);
      background: var(--glass-3);
      box-shadow: 0 0 14px var(--accent-glow-sm);
    }

    /* ── BUBBLES ──────────────────────────────────────────────────────────── */
    .msg {
      display: flex; flex-direction: column; gap: 6px;
      animation: fadeUp 0.28s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .msg-label {
      font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      font-weight: 500;
    }
    .msg.user .msg-label { color: rgba(123,140,255,0.7); }

    .msg-body {
      background: var(--glass-2);
      backdrop-filter: var(--blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text-2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .msg.user .msg-body {
      background: rgba(123,140,255,0.08);
      border-color: rgba(123,140,255,0.22);
      color: var(--text);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 0 20px rgba(123,140,255,0.07);
    }
    .msg.error .msg-body {
      border-color: rgba(248,113,113,.3);
      background: rgba(248,113,113,.05);
      color: var(--error);
    }

    .thinking .msg-body {
      display: flex; align-items: center; gap: 7px;
      color: var(--muted); font-style: italic;
    }
    .dots span { display:inline-block; animation:blink 1.2s infinite; font-style:normal; }
    .dots span:nth-child(2){ animation-delay:.2s; }
    .dots span:nth-child(3){ animation-delay:.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2;} 40%{opacity:1;} }

    /* Markdown */
    .msg-body p { margin-bottom:.5em; }
    .msg-body p:last-child { margin-bottom:0; }
    .msg-body strong { font-weight:500; color: var(--accent); }
    .msg-body em { font-style:italic; color: var(--accent-2); }
    .msg-body code {
      background: rgba(123,140,255,0.1);
      border: 1px solid rgba(123,140,255,0.2);
      border-radius: 4px; padding: 1px 6px;
      font-size: .88em; font-family: 'DM Mono', monospace;
      color: var(--accent);
    }
    .msg-body pre {
      background: rgba(0,0,0,.35);
      backdrop-filter: var(--blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      overflow-x: auto; margin: 8px 0; position: relative;
    }
    .msg-body pre code { background:none; border:none; padding:0; font-size:13px; line-height:1.6; color: var(--text-2); }
    .msg-body ul,.msg-body ol { padding-left:18px; margin:6px 0; }
    .msg-body li { margin-bottom:4px; }
    .msg-body h1,.msg-body h2,.msg-body h3 {
      font-weight:500; color: var(--accent); margin: 12px 0 5px;
    }
    .msg-body h1{font-size:18px;} .msg-body h2{font-size:16px;} .msg-body h3{font-size:14px; color: var(--accent-2);}
    .msg-body blockquote {
      border-left: 2px solid rgba(123,140,255,0.4);
      padding-left: 12px; color: var(--muted); margin: 8px 0;
    }
    .copy-code {
      position:absolute; top:8px; right:8px;
      background: var(--glass-2);
      backdrop-filter: var(--blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: 5px; padding: 3px 9px;
      font-size: 11px; font-family: 'DM Mono', monospace;
      color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .copy-code:hover { color: var(--accent); border-color: rgba(123,140,255,0.4); }

    /* Streaming cursor */
    .streaming::after {
      content: '▋'; color: var(--accent);
      animation: blink2 .7s step-end infinite;
      font-size:.9em; margin-left:2px;
      text-shadow: 0 0 8px var(--accent);
    }
    @keyframes blink2 { 50%{opacity:0;} }

    /* ── INPUT & FOOTER ───────────────────────────────────────────────────── */
    .input_and_footer {
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      position: sticky;
      bottom: 0;
      background: transparent;
      padding-top: 16px;
      z-index: 5;
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }

    textarea {
      flex: 1;
      background: var(--glass-2);
      backdrop-filter: var(--blur-md);
      -webkit-backdrop-filter: var(--blur-md);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.6;
      padding: 14px 18px;
      resize: none;
      min-height: 56px;
      max-height: 200px;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }
    textarea:focus {
      border-color: rgba(123,140,255,0.45);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 0 0 3px rgba(123,140,255,0.1),
        0 0 20px rgba(123,140,255,0.08);
    }
    textarea::placeholder { color: var(--muted); }

    #send-btn {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #080b14;
      border: none;
      border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 14px 22px;
      cursor: pointer;
      transition: opacity .2s, transform .12s, box-shadow .2s;
      white-space: nowrap;
      height: 56px;
      box-shadow: 0 0 20px var(--accent-glow-sm);
    }
    #send-btn:hover {
      opacity: .9;
      box-shadow: 0 0 28px var(--accent-glow);
    }
    #send-btn:active { transform: scale(.97); }
    #send-btn:disabled {
      background: var(--glass-2);
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    #stop-btn {
      display: none;
      background: rgba(248,113,113,.08);
      backdrop-filter: var(--blur-sm);
      border: 1px solid rgba(248,113,113,.3);
      border-radius: var(--radius-md);
      color: var(--error);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      padding: 14px 18px;
      height: 56px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }
    #stop-btn:hover { background: rgba(248,113,113,.15); }
    #stop-btn.visible { display: block; }

    .input-meta {
      display: flex; justify-content: space-between;
      align-items: center; padding: 9px 2px;
    }
    .hint { font-size: 11px; color: var(--muted); letter-spacing: 0.02em; }
    .char-counter { font-size: 11px; color: var(--muted); }
    .char-counter.warn  { color: #f59e0b; }
    .char-counter.limit { color: var(--error); }

    footer {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.04em;
      position: sticky;
      bottom: 0;
      background: transparent;
      padding-bottom: 16px;
    }
    footer a { color: rgba(123,140,255,0.7); text-decoration: none; transition: color .2s; }
    footer a:hover { color: var(--accent); }

    /* ── SCROLLBAR ────────────────────────────────────────────────────────── */
    #messages::-webkit-scrollbar,
    #chat-list::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb,
    #chat-list::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 2px;
    }

    /* ── INPUT AREA BG FADE ───────────────────────────────────────────────── */
    .input_and_footer::before {
      content: '';
      position: absolute;
      inset: -32px 0 0;
      background: linear-gradient(to bottom, transparent, var(--bg-1) 48%);
      pointer-events: none;
      z-index: -1;
    }

    /* ── MOBILE ───────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      #sidebar {
        position: fixed; top:0; left:0; bottom:0;
        z-index:100; width:268px !important; min-width:268px !important;
        transform: translateX(-100%);
        opacity:1 !important; pointer-events:all !important;
        transition: transform .3s cubic-bezier(.4,0,.2,1);
        box-shadow: 4px 0 40px rgba(0,0,0,.5);
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar.collapsed { transform: translateX(-100%); }
      #overlay {
        display:none; position:fixed; inset:0;
        background:rgba(0,0,0,.6); z-index:90;
        backdrop-filter: blur(4px);
      }
      #overlay.show { display:block; }
      #main { padding: 24px 16px 60px; }
      .container { max-width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }

  </style>
</head>
<body>

<div id="overlay"></div>

<!-- ── Sidebar ──────────────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-badge">Chats</div>
    <button id="new-chat-btn" title="New chat">+</button>
  </div>
  <div id="chat-list">
    <div class="sidebar-empty">No conversations yet.<br/>Start a new chat →</div>
  </div>
</aside>

<!-- ── Main ─────────────────────────────────────────────────────────────────── -->
<div id="main">
  <div class="container">

    <header>
      <button id="toggle-btn"> Chats</button>
      <div class="badge">AI Assistant</div>
      <h1>Ask <em>Cody</em></h1>
      <p class="subtitle">Your private AI assistant</p>
    </header>

    <div class="model-row">
      <div class="model-pill">
        <div class="status-dot"></div>
        <select id="model-select" title="Select model">
          <option value="">Loading…</option>
        </select>
      </div>
    </div>

    <div class="chat-window">
      <div class="chat-header">
        <div class="chat-header-left">
          <span class="model-name" id="header-model">—</span>
          <span>· response stream</span>
        </div>
        <span class="chat-header-title" id="header-title">New chat</span>
      </div>
      <div id="messages">
        <div class="suggestions-wrap" id="suggestions">
          <span class="suggestions-label">Ask me anything…</span>
          <div class="suggestions">
            <button class="chip" data-prompt="Explain quantum computing in simple terms">Quantum computing</button>
            <button class="chip" data-prompt="Write a Python function to sort a list of dicts by a key">Python sorting</button>
            <button class="chip" data-prompt="What are the pros and cons of microservices?">Microservices</button>
            <button class="chip" data-prompt="Summarize the key ideas of stoic philosophy">Stoicism</button>
          </div>
        </div>
      </div>
    </div>

    <div class="input_and_footer">
      <div class="input-area">
        <div class="input-row">
          <textarea id="prompt" rows="1" placeholder="Type your question here..." maxlength="32000" autocomplete="off"></textarea>
          <button id="stop-btn">■ Stop</button>
          <button id="send-btn">Send →</button>
        </div>
        <div class="input-meta">
          <p class="hint">Press <kbd>Ctrl+Enter</kbd> to send</p>
          <span class="char-counter" id="char-counter">0 / 32 000</span>
        </div>
      </div>
      <footer>
        Created by <a href="https://ollama.com" target="_blank">Mouloud EL ARRAM</a> · All processing is local
      </footer>
    </div>

  </div>
</div>

<script>
// ── Markdown ──────────────────────────────────────────────────────────────────
function renderMarkdown(text) {
  let h = esc(text);
  h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const id = 'cb' + Math.random().toString(36).slice(2,7);
    return `<pre><code id="${id}">${code.trim()}</code>`
      + `<button class="copy-code" onclick="copyCode('${id}',this)">copy</button></pre>`;
  });
  h = h.replace(/`([^`]+)`/g,         '<code>$1</code>');
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g,         '<em>$1</em>');
  h = h.replace(/^### (.+)$/gm,       '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm,        '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm,         '<h1>$1</h1>');
  h = h.replace(/^&gt; (.+)$/gm,      '<blockquote>$1</blockquote>');
  h = h.replace(/^[*\-] (.+)$/gm,     '<li>$1</li>');
  h = h.replace(/^\d+\. (.+)$/gm,     '<li>$1</li>');
  h = h.split(/\n{2,}/).map(b => {
    if (/^<(h[123]|li|pre|blockquote)/.test(b.trim())) return b;
    return `<p>${b.replace(/\n/g,'<br>')}</p>`;
  }).join('');
  return h;
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function copyCode(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent)
    .then(() => { btn.textContent='copied!'; setTimeout(()=>btn.textContent='copy',1500); });
}

// ── State ─────────────────────────────────────────────────────────────────────
let activeChatId = null;
let controller   = null;
const MAX = 32000;

// ── DOM ───────────────────────────────────────────────────────────────────────
const messagesEl  = document.getElementById('messages');
const promptEl    = document.getElementById('prompt');
const sendBtn     = document.getElementById('send-btn');
const stopBtn     = document.getElementById('stop-btn');
const modelSel    = document.getElementById('model-select');
const chatListEl  = document.getElementById('chat-list');
const sidebar     = document.getElementById('sidebar');
const overlay     = document.getElementById('overlay');
const headerModel = document.getElementById('header-model');
const headerTitle = document.getElementById('header-title');
const suggestWrap = document.getElementById('suggestions');
const charCounter = document.getElementById('char-counter');
const DEFAULT_MODEL = "mistral-large-3:675b-cloud";

// ── Sidebar toggle ────────────────────────────────────────────────────────────
document.getElementById('toggle-btn').addEventListener('click', () => {
  if (window.innerWidth <= 640) {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  } else {
    sidebar.classList.toggle('collapsed');
  }
});
overlay.addEventListener('click', () => {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
});

// ── Models ────────────────────────────────────────────────────────────────────
async function loadModels() {
  try {
    const data = await fetch('/api/models').then(r => r.json());
    if (data.models?.length) {
      modelSel.innerHTML = data.models.map(m => `<option value="${m}" ${m === DEFAULT_MODEL ? 'selected' : ''}>${m}</option>`).join('');
      headerModel.textContent = modelSel.value;
      modelSel.addEventListener('change', () => headerModel.textContent = modelSel.value);
    } else {
      modelSel.innerHTML = '<option value="">No models</option>';
    }
  } catch { modelSel.innerHTML = '<option value="">Unavailable</option>'; }
}

// ── Chat list ─────────────────────────────────────────────────────────────────
async function loadChatList() {
  try {
    const data = await fetch('/api/chats').then(r => r.json());
    renderChatList(data.chats || []);
  } catch {}
}

function renderChatList(chats) {
  if (!chats.length) {
    chatListEl.innerHTML = '<div class="sidebar-empty">No conversations yet.<br/>Start a new chat →</div>';
    return;
  }
  chatListEl.innerHTML = chats.map(c => `
    <div class="chat-item ${c.id === activeChatId ? 'active':''}" data-id="${c.id}">
      <div class="chat-item-body">
        <div class="chat-item-title">${esc(c.title)}</div>
        <div class="chat-item-date">${fmtDate(c.updated)}</div>
      </div>
      <button class="del-btn" title="Delete" onclick="deleteChat('${c.id}',event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        </svg>
      </button>
    </div>
  `).join('');

  chatListEl.querySelectorAll('.chat-item').forEach(el =>
    el.addEventListener('click', e => { if (!e.target.closest('.del-btn')) openChat(el.dataset.id); })
  );
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso+'Z'), now = new Date(), diff = now - d;
  if (diff < 60000)    return 'just now';
  if (diff < 3600000)  return Math.floor(diff/60000)+'m ago';
  if (diff < 86400000) return Math.floor(diff/3600000)+'h ago';
  return d.toLocaleDateString();
}

// ── Open chat ─────────────────────────────────────────────────────────────────
async function openChat(id) {
  if (activeChatId === id) return;
  activeChatId = id;
  messagesEl.innerHTML = '';
  try {
    const chat = await fetch(`/api/chats/${id}`).then(r => r.json());
    headerTitle.textContent = chat.title;
    if (chat.model && modelSel.querySelector(`option[value="${chat.model}"]`)) {
      modelSel.value = chat.model;
      headerModel.textContent = chat.model;
    }
    if (!chat.messages?.length) {
      messagesEl.appendChild(suggestWrap);
    } else {
      chat.messages.forEach(m => {
        if (m.role === 'user') addUserBubble(m.content);
        else addAIBubble(m.content);
      });
    }
  } catch { addError('Failed to load chat.'); }
  await loadChatList();
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
  scrollDown();
}

// ── New chat ──────────────────────────────────────────────────────────────────
document.getElementById('new-chat-btn').addEventListener('click', newChat);
async function newChat() {
  const model = modelSel.value || 'mistral-large-3:675b-cloud';
  try {
    const chat = await fetch('/api/chats', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ title: 'New chat', model }),
    }).then(r => r.json());
    activeChatId = chat.id;
    messagesEl.innerHTML = '';
    messagesEl.appendChild(suggestWrap);
    headerTitle.textContent = 'New chat';
    promptEl.value = '';
    promptEl.style.height = 'auto';
    charCounter.textContent = `0 / ${MAX.toLocaleString()}`;
    charCounter.className = 'char-counter';
    await loadChatList();
  } catch { addError('Could not create chat.'); }
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
  promptEl.focus();
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteChat(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this conversation?')) return;
  await fetch(`/api/chats/${id}`, { method: 'DELETE' });
  if (activeChatId === id) {
    activeChatId = null;
    messagesEl.innerHTML = '';
    messagesEl.appendChild(suggestWrap);
    headerTitle.textContent = 'New chat';
  }
  await loadChatList();
}

// ── Textarea ──────────────────────────────────────────────────────────────────
promptEl.addEventListener('input', () => {
  promptEl.style.height = 'auto';
  promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + 'px';
  const len = promptEl.value.length;
  charCounter.textContent = `${len.toLocaleString()} / ${MAX.toLocaleString()}`;
  charCounter.className = 'char-counter'+(len>MAX*.9?' limit':len>MAX*.75?' warn':'');
});
promptEl.addEventListener('keydown', e => {
  if (e.key==='Enter' && e.ctrlKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);
stopBtn.addEventListener('click', () => controller?.abort());
document.querySelectorAll('.chip').forEach(c =>
  c.addEventListener('click', () => {
    promptEl.value = c.dataset.prompt;
    promptEl.dispatchEvent(new Event('input'));
    promptEl.focus();
  })
);

// ── Bubble helpers ────────────────────────────────────────────────────────────
function addUserBubble(text) {
  if (suggestWrap.parentNode === messagesEl) suggestWrap.remove();
  const w = document.createElement('div');
  w.className = 'msg user';
  w.innerHTML = `<div class="msg-label">You</div><div class="msg-body">${esc(text)}</div>`;
  messagesEl.appendChild(w);
  scrollDown();
}
function addAIBubble(text) {
  const w = document.createElement('div');
  w.className = 'msg assistant';
  w.innerHTML = `<div class="msg-label">Cody</div><div class="msg-body">${renderMarkdown(text)}</div>`;
  messagesEl.appendChild(w);
  scrollDown();
}
function addThinking() {
  if (suggestWrap.parentNode === messagesEl) suggestWrap.remove();
  const w = document.createElement('div');
  w.className = 'msg assistant thinking';
  w.innerHTML = `<div class="msg-label">Cody</div>
    <div class="msg-body"><span>Thinking</span><span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`;
  messagesEl.appendChild(w);
  scrollDown();
  return w;
}
function promoteToStream(wrap) {
  wrap.classList.remove('thinking');
  const body = wrap.querySelector('.msg-body');
  body.className = 'msg-body streaming';
  body.innerHTML = '';
  return body;
}
function addError(msg) {
  const w = document.createElement('div');
  w.className = 'msg error';
  w.innerHTML = `<div class="msg-label">Error</div><div class="msg-body">⚠ ${esc(msg)}</div>`;
  messagesEl.appendChild(w);
  scrollDown();
}
function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

// ── Send ──────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const prompt = promptEl.value.trim();
  if (!prompt || controller) return;

  if (!activeChatId) {
    const model = modelSel.value || 'llama2:7b';
    try {
      const chat = await fetch('/api/chats', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ title: 'New chat', model }),
      }).then(r => r.json());
      activeChatId = chat.id;
    } catch { addError('Could not create chat session.'); return; }
  }

  const model = modelSel.value;
  if (!model) { addError('No model selected.'); return; }

  addUserBubble(prompt);
  promptEl.value = '';
  promptEl.style.height = 'auto';
  charCounter.textContent = `0 / ${MAX.toLocaleString()}`;
  charCounter.className = 'char-counter';

  sendBtn.disabled = true;
  stopBtn.classList.add('visible');
  controller = new AbortController();

  const thinkWrap = addThinking();
  let body = null, raw = '';

  try {
    const res = await fetch(`/api/chats/${activeChatId}/ask`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ prompt, model }),
      signal: controller.signal,
    });
    if (!res.ok) { thinkWrap.remove(); addError((await res.json()).error||'Request failed.'); return; }

    const reader = res.body.getReader(), decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let p; try { p = JSON.parse(line.slice(6)); } catch { continue; }
        if (p.error) { thinkWrap.remove(); addError(p.error); return; }
        if (p.token) {
          if (!body) body = promoteToStream(thinkWrap);
          raw += p.token;
          body.innerHTML = renderMarkdown(raw);
          scrollDown();
        }
        if (p.done) break;
      }
    }
    if (body) { body.classList.remove('streaming'); body.innerHTML = renderMarkdown(raw); }
    if (!body) { thinkWrap.remove(); addError('No response received.'); }

    await loadChatList();
    const firstUser = messagesEl.querySelector('.msg.user .msg-body');
    if (firstUser) headerTitle.textContent = firstUser.textContent.slice(0,60);

  } catch (err) {
    thinkWrap.remove();
    if (err.name !== 'AbortError') addError('Connection lost. Please try again.');
  } finally {
    sendBtn.disabled = false;
    stopBtn.classList.remove('visible');
    controller = null;
    scrollDown();
    promptEl.focus();
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => { await loadModels(); await loadChatList(); })();
</script>
</body>
</html>
