<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Cody AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>

    /* ── DESIGN TOKENS ────────────────────────────────────────────────────── */
    :root {
      /* Light palette */
      --bg:           #f7f4ef;
      --bg-secondary: #f0ece4;
      --surface:      #fffefb;
      --surface-2:    #f5f1ea;
      --border:       #e0d9ce;
      --border-soft:  #ede8df;
      --accent:       #8b6f47;
      --accent-light: #c4a882;
      --accent-dim:   #a68660;
      --text:         #1c1814;
      --text-2:       #4a4440;
      --muted:        #9a9088;
      --muted-light:  #bab4ac;
      --error:        #b85c5c;
      --shadow-sm:    0 1px 3px rgba(28,24,20,.06), 0 1px 2px rgba(28,24,20,.04);
      --shadow-md:    0 4px 16px rgba(28,24,20,.07), 0 1px 4px rgba(28,24,20,.04);
      --shadow-lg:    0 12px 40px rgba(28,24,20,.10), 0 2px 8px rgba(28,24,20,.05);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #111009;
        --bg-secondary: #161410;
        --surface:      #1c1a15;
        --surface-2:    #221f19;
        --border:       #2e2b24;
        --border-soft:  #252118;
        --accent:       #c4a882;
        --accent-light: #d9c4a4;
        --accent-dim:   #a68660;
        --text:         #ede8df;
        --text-2:       #c8c0b4;
        --muted:        #7a7268;
        --muted-light:  #5a5450;
        --error:        #c97070;
        --shadow-sm:    0 1px 3px rgba(0,0,0,.2);
        --shadow-md:    0 4px 16px rgba(0,0,0,.3);
        --shadow-lg:    0 12px 40px rgba(0,0,0,.4);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── BASE ─────────────────────────────────────────────────────────────── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      transition: background .4s ease, color .4s ease;
    }

    /* Subtle grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* Thin top rule — editorial hallmark */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      z-index: 1000;
      opacity: 0.6;
    }

    /* ── SIDEBAR ──────────────────────────────────────────────────────────── */
    #sidebar {
      position: relative;
      z-index: 20;
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: width .32s cubic-bezier(.4,0,.2,1),
                  min-width .32s cubic-bezier(.4,0,.2,1),
                  opacity .32s ease;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    #sidebar.collapsed {
      width: 0;
      min-width: 0;
      opacity: 0;
      pointer-events: none;
    }

    .sidebar-head {
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sidebar-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .sidebar-badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.65); }
    }

    #new-chat-btn {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 30px; height: 30px;
      font-size: 18px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .15s;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
    }
    #new-chat-btn:hover {
      background: var(--surface-2);
      border-color: var(--accent-light);
    }
    #new-chat-btn:active { transform: scale(.93); }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .18s ease, border-color .18s ease;
    }
    .chat-item:hover { background: var(--surface-2); }
    .chat-item.active {
      background: var(--bg-secondary);
      border-color: var(--border);
    }
    .chat-item-body { flex: 1; overflow: hidden; }
    .chat-item-title {
      font-size: 12.5px;
      font-weight: 400;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }
    .chat-item.active .chat-item-title { color: var(--accent); }
    .chat-item-date {
      font-size: 10px;
      color: var(--muted-light);
      margin-top: 2px;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    .del-btn {
      display: none;
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      width: 24px; height: 24px;
      align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted-light);
      transition: all .15s;
      flex-shrink: 0;
    }
    .del-btn svg { width: 11px; height: 11px; }
    .chat-item:hover .del-btn { display: flex; }
    .del-btn:hover { color: var(--error); border-color: rgba(184,92,92,.25); }

    .sidebar-empty {
      padding: 48px 20px;
      text-align: center;
      font-size: 12px;
      color: var(--muted-light);
      line-height: 2;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
    }

    /* Sidebar footer rule */
    .sidebar-foot {
      padding: 14px 20px;
      border-top: 1px solid var(--border-soft);
      font-size: 10px;
      color: var(--muted-light);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── MAIN ─────────────────────────────────────────────────────────────── */
    #main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 40px 20px 80px;
      min-height: 100vh;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 78%;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* ── HEADER ───────────────────────────────────────────────────────────── */
    header {
      margin-bottom: 44px;
      padding-top: 20px;
    }

    #toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 14px;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: 28px;
      transition: border-color .2s, color .2s, background .2s;
    }
    #toggle-btn:hover {
      border-color: var(--accent-light);
      color: var(--accent);
      background: var(--surface-2);
    }
    #toggle-btn::before {
      content: '☰';
      font-style: normal;
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 2px;
      margin-bottom: 22px;
    }
    .badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.5s infinite;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(40px, 6vw, 64px);
      font-weight: 300;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }
    h1 em {
      font-style: italic;
      color: var(--accent);
      font-weight: 300;
    }

    .subtitle {
      font-size: 12px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Decorative rule under header */
    header::after {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: var(--accent-light);
      margin-top: 22px;
      opacity: 0.7;
    }

    /* ── MODEL ROW ────────────────────────────────────────────────────────── */
    .model-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .model-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 14px;
      transition: border-color .2s;
      box-shadow: var(--shadow-sm);
    }
    .model-pill:focus-within { border-color: var(--accent-light); }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.5s infinite;
    }
    #model-select {
      background: none; border: none; outline: none;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--text-2);
      cursor: pointer;
      max-width: 220px;
      letter-spacing: 0.02em;
    }
    #model-select option { background: var(--surface); color: var(--text); }

    /* ── CHAT WINDOW ──────────────────────────────────────────────────────── */
    .chat-window {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      flex: 1;
      box-shadow: var(--shadow-md);
      transition: box-shadow .3s ease;
    }
    .chat-window:focus-within { box-shadow: var(--shadow-lg); }

    .chat-header {
      padding: 13px 22px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-light);
      background: var(--bg-secondary);
    }
    .chat-header-left { display: flex; align-items: center; gap: 10px; }
    .chat-header span.model-name {
      color: var(--accent);
      font-weight: 400;
    }
    .chat-header-title {
      font-size: 10px;
      font-weight: 400;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      letter-spacing: 0;
      text-transform: none;
    }

    /* Thin accent line at top of chat window */
    .chat-header::before {
      display: none;
    }

    /* ── MESSAGES ─────────────────────────────────────────────────────────── */
    #messages {
      padding: 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-height: none;
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* Suggestions */
    .suggestions-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 18px;
      padding: 48px 0 32px;
    }
    .suggestions-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.01em;
    }
    .suggestions {
      display: flex; flex-wrap: wrap;
      gap: 8px; justify-content: center;
    }
    .chip {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 7px 16px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s ease;
    }
    .chip:hover {
      border-color: var(--accent-light);
      color: var(--accent);
      background: var(--surface-2);
    }

    /* ── MESSAGE BUBBLES ──────────────────────────────────────────────────── */
    .msg {
      display: flex; flex-direction: column; gap: 7px;
      animation: fadeUp 0.28s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted-light);
      font-weight: 400;
    }
    .msg.user .msg-label { color: var(--accent-dim); }

    .msg-body {
      background: var(--surface-2);
      border: 1px solid var(--border-soft);
      border-radius: 6px;
      padding: 16px 20px;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text-2);
    }
    .msg.user .msg-body {
      background: transparent;
      border-color: var(--border);
      color: var(--text);
      border-left: 2px solid var(--accent-light);
      border-radius: 0 6px 6px 0;
      padding-left: 18px;
    }
    .msg.error .msg-body {
      border-color: rgba(184,92,92,.3);
      background: rgba(184,92,92,.04);
      color: var(--error);
    }

    /* Thinking */
    .thinking .msg-body {
      display: flex; align-items: center; gap: 8px;
      color: var(--muted); font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
    }
    .dots span { display: inline-block; animation: blink 1.4s infinite; font-style: normal; }
    .dots span:nth-child(2) { animation-delay: 0.22s; }
    .dots span:nth-child(3) { animation-delay: 0.44s; }
    @keyframes blink { 0%,80%,100%{opacity:.15;} 40%{opacity:1;} }

    /* Markdown inside msg-body */
    .msg-body p { margin-bottom: .55em; color: var(--text-2); }
    .msg-body p:last-child { margin-bottom: 0; }
    .msg-body strong { font-weight: 500; color: var(--text); }
    .msg-body em { font-style: italic; color: var(--accent-dim); }
    .msg-body code {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: .87em;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
    }
    .msg-body pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 18px;
      overflow-x: auto;
      margin: 10px 0;
      position: relative;
    }
    .msg-body pre code {
      background: none; border: none; padding: 0;
      font-size: 12.5px; line-height: 1.7;
      color: var(--text-2);
    }
    .msg-body ul, .msg-body ol { padding-left: 18px; margin: 7px 0; }
    .msg-body li { margin-bottom: 5px; color: var(--text-2); }
    .msg-body h1, .msg-body h2, .msg-body h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      color: var(--text);
      margin: 14px 0 6px;
    }
    .msg-body h1 { font-size: 20px; } 
    .msg-body h2 { font-size: 17px; } 
    .msg-body h3 { font-size: 15px; font-style: italic; color: var(--accent-dim); }
    .msg-body blockquote {
      border-left: 2px solid var(--accent-light);
      padding-left: 14px;
      color: var(--muted);
      margin: 10px 0;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
    }
    .copy-code {
      position: absolute; top: 10px; right: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 9px;
      font-size: 10px;
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .copy-code:hover { color: var(--accent); border-color: var(--accent-light); }

    /* Streaming cursor */
    .streaming::after {
      content: '|';
      color: var(--accent);
      animation: blink2 .8s step-end infinite;
      font-size: .85em;
      margin-left: 1px;
      font-weight: 300;
    }
    @keyframes blink2 { 50% { opacity: 0; } }

    /* ── INPUT & FOOTER ───────────────────────────────────────────────────── */
    .input_and_footer {
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      position: sticky;
      bottom: 0;
      background: var(--bg);
      padding-top: 16px;
      z-index: 5;
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.65;
      padding: 14px 18px;
      resize: none;
      min-height: 54px;
      max-height: 200px;
      transition: border-color .2s ease, box-shadow .2s ease;
      outline: none;
      box-shadow: var(--shadow-sm);
    }
    textarea:focus {
      border-color: var(--accent-light);
      box-shadow: 0 0 0 3px rgba(196,168,130,.1);
    }
    textarea::placeholder {
      color: var(--muted-light);
      font-style: italic;
      font-weight: 300;
    }

    #send-btn {
      background: var(--accent);
      color: var(--surface);
      border: none;
      border-radius: 6px;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 14px 24px;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      white-space: nowrap;
      height: 54px;
      box-shadow: var(--shadow-sm);
    }
    #send-btn:hover {
      background: var(--accent-dim);
      box-shadow: var(--shadow-md);
    }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled {
      background: var(--border);
      color: var(--muted-light);
      cursor: not-allowed;
      box-shadow: none;
    }

    #stop-btn {
      display: none;
      background: transparent;
      border: 1px solid rgba(184,92,92,.35);
      border-radius: 6px;
      color: var(--error);
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 14px 18px;
      height: 54px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, border-color .2s;
    }
    #stop-btn:hover {
      background: rgba(184,92,92,.07);
      border-color: rgba(184,92,92,.5);
    }
    #stop-btn.visible { display: block; }

    .input-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 2px;
    }
    .hint {
      font-size: 10.5px;
      color: var(--muted-light);
      letter-spacing: 0.04em;
      font-weight: 300;
    }
    .hint kbd {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }
    .char-counter { font-size: 10.5px; color: var(--muted-light); font-weight: 300; }
    .char-counter.warn  { color: #c4933f; }
    .char-counter.limit { color: var(--error); }

    footer {
      font-size: 10px;
      color: var(--muted-light);
      text-align: center;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      position: sticky;
      bottom: 0;
      background: var(--bg);
      padding-bottom: 16px;
      font-weight: 300;
    }
    footer a {
      color: var(--accent-dim);
      text-decoration: none;
      transition: color .18s;
    }
    footer a:hover { color: var(--accent); }

    /* Divider dot in footer */
    footer .sep { margin: 0 8px; opacity: .4; }

    /* ── SCROLLBAR ────────────────────────────────────────────────────────── */
    #messages::-webkit-scrollbar,
    #chat-list::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track,
    #chat-list::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb,
    #chat-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* ── MOBILE ───────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      #sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        z-index: 100; width: 280px !important; min-width: 280px !important;
        transform: translateX(-100%);
        opacity: 1 !important; pointer-events: all !important;
        transition: transform .3s cubic-bezier(.4,0,.2,1);
        box-shadow: var(--shadow-lg);
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar.collapsed { transform: translateX(-100%); }
      #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 90; backdrop-filter: blur(2px); }
      #overlay.show { display: block; }
      #main { padding: 24px 16px 60px; }
      .container { max-width: 100%; }
    }

    /* ── REDUCED MOTION ───────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }

  </style>
</head>
<body>

<div id="overlay"></div>

<!-- ── Sidebar ──────────────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-badge">Conversations</div>
    <button id="new-chat-btn" title="New chat">+</button>
  </div>
  <div id="chat-list">
    <div class="sidebar-empty">No conversations yet.<br/>Begin a new dialogue →</div>
  </div>
</aside>

<!-- ── Main ─────────────────────────────────────────────────────────────────── -->
<div id="main">
  <div class="container">

    <header>
      <button id="toggle-btn"> Chats</button>
      <div class="badge">AI Assistant</div>
      <h1>Ask <em>Cody</em></h1>
      <p class="subtitle">Your private AI assistant</p>
    </header>

    <!-- Model selector -->
    <div class="model-row">
      <div class="model-pill">
        <div class="status-dot"></div>
        <select id="model-select" title="Select model">
          <option value="">Loading…</option>
        </select>
      </div>
    </div>

    <!-- Chat window -->
    <div class="chat-window">
      <div class="chat-header">
        <div class="chat-header-left">
          <span class="model-name" id="header-model">—</span>
          <span>· response stream</span>
        </div>
        <span class="chat-header-title" id="header-title">New chat</span>
      </div>
      <div id="messages">
        <div class="suggestions-wrap" id="suggestions">
          <span class="suggestions-label">Ask me anything…</span>
          <div class="suggestions">
            <button class="chip" data-prompt="Explain quantum computing in simple terms">Quantum computing</button>
            <button class="chip" data-prompt="Write a Python function to sort a list of dicts by a key">Python sorting</button>
            <button class="chip" data-prompt="What are the pros and cons of microservices?">Microservices</button>
            <button class="chip" data-prompt="Summarize the key ideas of stoic philosophy">Stoicism</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input_and_footer">
      <div class="input-area">
        <div class="input-row">
          <textarea id="prompt" rows="1" placeholder="Type your question here…" maxlength="32000" autocomplete="off"></textarea>
          <button id="stop-btn">■ Stop</button>
          <button id="send-btn">Send →</button>
        </div>
        <div class="input-meta">
          <p class="hint">Press <kbd>Ctrl+Enter</kbd> to send</p>
          <span class="char-counter" id="char-counter">0 / 32 000</span>
        </div>
      </div>

      <footer>
        Created by <a href="https://ollama.com" target="_blank">Mouloud EL ARRAM</a>
        <span class="sep">·</span>
        All processing is local
      </footer>
    </div>

  </div>
</div>

<script>
// ── Markdown ──────────────────────────────────────────────────────────────────
function renderMarkdown(text) {
  let h = esc(text);
  h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const id = 'cb' + Math.random().toString(36).slice(2,7);
    return `<pre><code id="${id}">${code.trim()}</code>`
      + `<button class="copy-code" onclick="copyCode('${id}',this)">copy</button></pre>`;
  });
  h = h.replace(/`([^`]+)`/g,         '<code>$1</code>');
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g,         '<em>$1</em>');
  h = h.replace(/^### (.+)$/gm,       '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm,        '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm,         '<h1>$1</h1>');
  h = h.replace(/^&gt; (.+)$/gm,      '<blockquote>$1</blockquote>');
  h = h.replace(/^[*\-] (.+)$/gm,     '<li>$1</li>');
  h = h.replace(/^\d+\. (.+)$/gm,     '<li>$1</li>');
  h = h.split(/\n{2,}/).map(b => {
    if (/^<(h[123]|li|pre|blockquote)/.test(b.trim())) return b;
    return `<p>${b.replace(/\n/g,'<br>')}</p>`;
  }).join('');
  return h;
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function copyCode(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent)
    .then(() => { btn.textContent='copied!'; setTimeout(()=>btn.textContent='copy',1500); });
}

// ── State ─────────────────────────────────────────────────────────────────────
let activeChatId = null;
let controller   = null;
const MAX = 32000;

// ── DOM ───────────────────────────────────────────────────────────────────────
const messagesEl  = document.getElementById('messages');
const promptEl    = document.getElementById('prompt');
const sendBtn     = document.getElementById('send-btn');
const stopBtn     = document.getElementById('stop-btn');
const modelSel    = document.getElementById('model-select');
const chatListEl  = document.getElementById('chat-list');
const sidebar     = document.getElementById('sidebar');
const overlay     = document.getElementById('overlay');
const headerModel = document.getElementById('header-model');
const headerTitle = document.getElementById('header-title');
const suggestWrap = document.getElementById('suggestions');
const charCounter = document.getElementById('char-counter');
const DEFAULT_MODEL = "mistral-large-3:675b-cloud";

// ── Sidebar toggle ────────────────────────────────────────────────────────────
document.getElementById('toggle-btn').addEventListener('click', () => {
  if (window.innerWidth <= 640) {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  } else {
    sidebar.classList.toggle('collapsed');
  }
});
overlay.addEventListener('click', () => {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
});

// ── Models ────────────────────────────────────────────────────────────────────
async function loadModels() {
  try {
    const data = await fetch('/api/models').then(r => r.json());
    if (data.models?.length) {
      modelSel.innerHTML = data.models.map(m => `<option value="${m}" ${m === DEFAULT_MODEL ? 'selected' : ''}>${m}</option>`).join('');
      headerModel.textContent = modelSel.value;
      modelSel.addEventListener('change', () => headerModel.textContent = modelSel.value);
    } else {
      modelSel.innerHTML = '<option value="">No models</option>';
    }
  } catch { modelSel.innerHTML = '<option value="">Unavailable</option>'; }
}

// ── Chat list ─────────────────────────────────────────────────────────────────
async function loadChatList() {
  try {
    const data = await fetch('/api/chats').then(r => r.json());
    renderChatList(data.chats || []);
  } catch {}
}

function renderChatList(chats) {
  if (!chats.length) {
    chatListEl.innerHTML = '<div class="sidebar-empty">No conversations yet.<br/>Begin a new dialogue →</div>';
    return;
  }
  chatListEl.innerHTML = chats.map(c => `
    <div class="chat-item ${c.id === activeChatId ? 'active':''}" data-id="${c.id}">
      <div class="chat-item-body">
        <div class="chat-item-title">${esc(c.title)}</div>
        <div class="chat-item-date">${fmtDate(c.updated)}</div>
      </div>
      <button class="del-btn" title="Delete" onclick="deleteChat('${c.id}',event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        </svg>
      </button>
    </div>
  `).join('');

  chatListEl.querySelectorAll('.chat-item').forEach(el =>
    el.addEventListener('click', e => { if (!e.target.closest('.del-btn')) openChat(el.dataset.id); })
  );
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso+'Z'), now = new Date(), diff = now - d;
  if (diff < 60000)    return 'just now';
  if (diff < 3600000)  return Math.floor(diff/60000)+'m ago';
  if (diff < 86400000) return Math.floor(diff/3600000)+'h ago';
  return d.toLocaleDateString();
}

// ── Open chat ─────────────────────────────────────────────────────────────────
async function openChat(id) {
  if (activeChatId === id) return;
  activeChatId = id;
  messagesEl.innerHTML = '';
  try {
    const chat = await fetch(`/api/chats/${id}`).then(r => r.json());
    headerTitle.textContent = chat.title;
    if (chat.model && modelSel.querySelector(`option[value="${chat.model}"]`)) {
      modelSel.value = chat.model;
      headerModel.textContent = chat.model;
    }
    if (!chat.messages?.length) {
      messagesEl.appendChild(suggestWrap);
    } else {
      chat.messages.forEach(m => {
        if (m.role === 'user') addUserBubble(m.content);
        else addAIBubble(m.content);
      });
    }
  } catch { addError('Failed to load chat.'); }
  await loadChatList();
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
  scrollDown();
}

// ── New chat ──────────────────────────────────────────────────────────────────
document.getElementById('new-chat-btn').addEventListener('click', newChat);
async function newChat() {
  const model = modelSel.value || 'mistral-large-3:675b-cloud';
  try {
    const chat = await fetch('/api/chats', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ title: 'New chat', model }),
    }).then(r => r.json());
    activeChatId = chat.id;
    messagesEl.innerHTML = '';
    messagesEl.appendChild(suggestWrap);
    headerTitle.textContent = 'New chat';
    promptEl.value = '';
    promptEl.style.height = 'auto';
    charCounter.textContent = `0 / ${MAX.toLocaleString()}`;
    charCounter.className = 'char-counter';
    await loadChatList();
  } catch { addError('Could not create chat.'); }
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
  promptEl.focus();
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteChat(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this conversation?')) return;
  await fetch(`/api/chats/${id}`, { method: 'DELETE' });
  if (activeChatId === id) {
    activeChatId = null;
    messagesEl.innerHTML = '';
    messagesEl.appendChild(suggestWrap);
    headerTitle.textContent = 'New chat';
  }
  await loadChatList();
}

// ── Textarea ──────────────────────────────────────────────────────────────────
promptEl.addEventListener('input', () => {
  promptEl.style.height = 'auto';
  promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + 'px';
  const len = promptEl.value.length;
  charCounter.textContent = `${len.toLocaleString()} / ${MAX.toLocaleString()}`;
  charCounter.className = 'char-counter'+(len>MAX*.9?' limit':len>MAX*.75?' warn':'');
});
promptEl.addEventListener('keydown', e => {
  if (e.key==='Enter' && e.ctrlKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);
stopBtn.addEventListener('click', () => controller?.abort());
document.querySelectorAll('.chip').forEach(c =>
  c.addEventListener('click', () => {
    promptEl.value = c.dataset.prompt;
    promptEl.dispatchEvent(new Event('input'));
    promptEl.focus();
  })
);

// ── Bubble helpers ────────────────────────────────────────────────────────────
function addUserBubble(text) {
  if (suggestWrap.parentNode === messagesEl) suggestWrap.remove();
  const w = document.createElement('div');
  w.className = 'msg user';
  w.innerHTML = `<div class="msg-label">You</div><div class="msg-body">${esc(text)}</div>`;
  messagesEl.appendChild(w);
  scrollDown();
}
function addAIBubble(text) {
  const w = document.createElement('div');
  w.className = 'msg assistant';
  w.innerHTML = `<div class="msg-label">Cody</div><div class="msg-body">${renderMarkdown(text)}</div>`;
  messagesEl.appendChild(w);
  scrollDown();
}
function addThinking() {
  if (suggestWrap.parentNode === messagesEl) suggestWrap.remove();
  const w = document.createElement('div');
  w.className = 'msg assistant thinking';
  w.innerHTML = `<div class="msg-label">Cody</div>
    <div class="msg-body"><span>Thinking</span><span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`;
  messagesEl.appendChild(w);
  scrollDown();
  return w;
}
function promoteToStream(wrap) {
  wrap.classList.remove('thinking');
  const body = wrap.querySelector('.msg-body');
  body.className = 'msg-body streaming';
  body.innerHTML = '';
  return body;
}
function addError(msg) {
  const w = document.createElement('div');
  w.className = 'msg error';
  w.innerHTML = `<div class="msg-label">Error</div><div class="msg-body">⚠ ${esc(msg)}</div>`;
  messagesEl.appendChild(w);
  scrollDown();
}
function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

// ── Send ──────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const prompt = promptEl.value.trim();
  if (!prompt || controller) return;

  if (!activeChatId) {
    const model = modelSel.value || 'llama2:7b';
    try {
      const chat = await fetch('/api/chats', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ title: 'New chat', model }),
      }).then(r => r.json());
      activeChatId = chat.id;
    } catch { addError('Could not create chat session.'); return; }
  }

  const model = modelSel.value;
  if (!model) { addError('No model selected.'); return; }

  addUserBubble(prompt);
  promptEl.value = '';
  promptEl.style.height = 'auto';
  charCounter.textContent = `0 / ${MAX.toLocaleString()}`;
  charCounter.className = 'char-counter';

  sendBtn.disabled = true;
  stopBtn.classList.add('visible');
  controller = new AbortController();

  const thinkWrap = addThinking();
  let body = null, raw = '';

  try {
    const res = await fetch(`/api/chats/${activeChatId}/ask`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ prompt, model }),
      signal: controller.signal,
    });
    if (!res.ok) { thinkWrap.remove(); addError((await res.json()).error||'Request failed.'); return; }

    const reader = res.body.getReader(), decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let p; try { p = JSON.parse(line.slice(6)); } catch { continue; }
        if (p.error) { thinkWrap.remove(); addError(p.error); return; }
        if (p.token) {
          if (!body) body = promoteToStream(thinkWrap);
          raw += p.token;
          body.innerHTML = renderMarkdown(raw);
          scrollDown();
        }
        if (p.done) break;
      }
    }
    if (body) { body.classList.remove('streaming'); body.innerHTML = renderMarkdown(raw); }
    if (!body) { thinkWrap.remove(); addError('No response received.'); }

    await loadChatList();
    const firstUser = messagesEl.querySelector('.msg.user .msg-body');
    if (firstUser) headerTitle.textContent = firstUser.textContent.slice(0,60);

  } catch (err) {
    thinkWrap.remove();
    if (err.name !== 'AbortError') addError('Connection lost. Please try again.');
  } finally {
    sendBtn.disabled = false;
    stopBtn.classList.remove('visible');
    controller = null;
    scrollDown();
    promptEl.focus();
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => { await loadModels(); await loadChatList(); })();
</script>
</body>
</html>
